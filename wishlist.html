<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist - Pok&eacute;mon Card Checklist</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 20px;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 12px;
    color: #7ec8e3;
    text-decoration: none;
    font-size: 14px;
  }
  .back-link:hover { text-decoration: underline; }

  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 6px;
    color: #e8a0e8;
  }

  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
  }

  .stats-bar {
    text-align: center;
    margin-bottom: 8px;
    font-size: 15px;
    color: #aaa;
  }

  .stats-bar span {
    font-weight: bold;
    color: #e8a0e8;
  }

  .stats-detail {
    text-align: center;
    margin-bottom: 10px;
    font-size: 13px;
    color: #888;
  }

  .stats-detail b { color: #bbb; font-weight: 600; }

  .sync-note {
    text-align: center;
    font-size: 12px;
    color: #777;
    margin-bottom: 16px;
    line-height: 1.4;
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }

  .set-group { margin-bottom: 30px; }

  .set-header {
    font-size: 20px;
    font-weight: bold;
    color: #f0c040;
    border-bottom: 2px solid #f0c04055;
    padding-bottom: 6px;
    margin-bottom: 14px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .card {
    background: #16213e;
    border: 1px solid #333;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow .2s;
    position: relative;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .card:hover { box-shadow: 0 0 12px rgba(232,160,232,.35); }
  .card.owned { border-color: #4caf50; }
  .card.owned .status-badge { display: block; background: #4caf50; }
  .card.ontheway { border-color: #ff9800; }
  .card.ontheway .status-badge { display: block; background: #ff9800; }

  .status-badge {
    display: none;
    position: absolute;
    top: 8px;
    right: 8px;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 4px;
    z-index: 2;
  }

  .card-img-wrap {
    background: #0d1b36;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    padding: 10px;
  }

  .card-img-wrap img {
    max-width: 100%;
    max-height: 260px;
    border-radius: 6px;
  }

  .card-info {
    padding: 10px 12px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-name { font-size: 15px; font-weight: bold; color: #fff; }

  .card-meta {
    font-size: 12px;
    color: #aaa;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
  }

  .card-meta b { color: #ccc; }

  .rarity-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
  }

  .rarity-sar   { background: #e65100; }
  .rarity-ir    { background: #00838f; }
  .rarity-holo  { background: #5c6bc0; }
  .rarity-ur    { background: #6a1b9a; }
  .rarity-uncommon { background: #558b2f; }
  .rarity-promo { background: #b71c1c; }
  .rarity-mar   { background: #d50000; }
  .rarity-dr    { background: #1565c0; }
  .rarity-common { background: #757575; }

  .type-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
  }

  .type-grass     { background: #4caf50; }
  .type-fire      { background: #f44336; }
  .type-water     { background: #2196f3; }
  .type-electric  { background: #fbc02d; color: #333; }
  .type-psychic   { background: #9c27b0; }
  .type-fighting  { background: #a1887f; }
  .type-dragon    { background: #7c4dff; }
  .type-darkness  { background: #424242; }
  .type-metal     { background: #78909c; }
  .type-colorless { background: #78909c; }
  .type-trainer   { background: #607d8b; }

  .status-row {
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid #ffffff15;
  }

  .status-btn {
    width: 100%;
    padding: 7px 12px;
    border: 2px solid #555;
    border-radius: 6px;
    background: transparent;
    color: #bbb;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: all .15s;
  }

  .status-btn:hover { border-color: #888; color: #fff; }

  .status-btn.ontheway {
    border-color: #ff9800;
    color: #ff9800;
    background: #ff980015;
  }

  .status-btn.owned {
    border-color: #4caf50;
    color: #4caf50;
    background: #4caf5015;
  }

  @media print {
    body { background: #fff; color: #000; padding: 0; font-size: 11px; }
    .back-link { display: none; }
    h1 { color: #000; font-size: 22px; }
    .subtitle { color: #555; }
    .stats-bar { display: none; }
    .set-header { color: #000; border-color: #000; font-size: 16px; }

    .card-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .card {
      background: #fff;
      border: 1.5px solid #000;
      border-radius: 6px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .card:hover { box-shadow: none; }
    .card.owned { display: none !important; }
    .card-img-wrap { background: #f5f5f5; min-height: 120px; padding: 6px; }

    .card-img-wrap img {
      max-height: 170px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .card-info { padding: 6px 8px 8px; }
    .card-name { color: #000; font-size: 12px; }
    .card-meta { color: #333; font-size: 10px; }
    .card-meta b { color: #000; }

    .rarity-badge, .type-badge, .status-badge {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .status-btn {
      font-size: 11px;
      padding: 4px 8px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .set-group { break-inside: avoid; }
  }

  #lock-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
  }
  #lock-screen.hidden { display: none; }
  .lock-box {
    background: #16213e; border-radius: 16px; padding: 40px 32px;
    text-align: center; width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .lock-box h2 { color: #fff; margin-bottom: 8px; font-size: 22px; }
  .lock-box p { color: #888; font-size: 13px; margin-bottom: 24px; }
  .lock-box input {
    width: 100%; padding: 12px 16px; border-radius: 8px; border: 2px solid #333;
    background: #0f0f23; color: #fff; font-size: 16px; outline: none;
    margin-bottom: 16px; text-align: center;
  }
  .lock-box input:focus { border-color: #7ec8e3; }
  .lock-box button {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .lock-box button:hover { opacity: .9; }
  .lock-error { color: #ef5350; font-size: 13px; margin-top: 8px; min-height: 20px; }
  @media print { #lock-screen { display: none !important; } }

function getImgUrl(c) {
  if (c.number.startsWith("h")) return `https://www.serebii.net/card/${c.setSlug}/${c.number}.jpg`;
  return `https://www.serebii.net/card/${c.setSlug}/${parseInt(c.number, 10)}.jpg`;
}

function cardId(c) { return `${c.setSlug}-${c.number}`; }

const LIST_ID = "wishlist";
let progressMap = {};

function loadOwned() {
  return progressMap;
}

function setSyncNote(msg, color) {
  const el = document.getElementById("sync-note");
  if (!el) return;
  el.textContent = msg || "";
  el.style.color = color || "#777";
}

function canSaveProgressFiles() {
  const h = location.hostname;
  return h === "127.0.0.1" || h === "localhost";
}

function envHint() {
  if (canSaveProgressFiles()) {
    setSyncNote(
      "Local server: clicks save to progress/wishlist.json. Commit and push so GitHub Pages picks up changes.",
      "#e8a0e8"
    );
  } else if (location.protocol === "file:") {
    setSyncNote(
      "Opened as a file: the browser cannot write into progress/wishlist.json. Run npm run local and open http://127.0.0.1:8765/wishlist.html to save changes you can commit.",
      "#ffb74d"
    );
  } else {
    setSyncNote(
      "Published copy: data comes from progress/wishlist.json in the repo. You can click cards to preview in this tab only—refresh restores the site; nothing here changes Git or your files.",
      "#888"
    );
  }
}

async function pullProgress() {
  progressMap = await PokeProgress.loadListProgress(LIST_ID);
}

async function persistProgress() {
  if (!canSaveProgressFiles()) return;
  const ok = await PokeProgress.saveListProgress(LIST_ID, progressMap);
  if (ok) {
    setSyncNote("Saved to progress/wishlist.json — commit and push when you are ready.", "#81c784");
  } else {
    setSyncNote("Could not write the file. Start the local server: npm run local — then open http://127.0.0.1:8765/wishlist.html", "#ffb74d");
  }
}

function updateCount() {
  const total = CARDS.length;
  const c = PokeProgress.countFromMap(progressMap, total);
  document.getElementById("count-owned").textContent = c.owned;
  document.getElementById("count-total").textContent = total;
  const det = document.getElementById("stats-detail");
  if (det) {
    det.innerHTML =
      "<b>Owned:</b> " + c.owned +
      " &nbsp;|&nbsp; <b>On the way:</b> " + c.ontheway +
      " &nbsp;|&nbsp; <b>Not yet:</b> " + c.missing;
  }
}

function render() {
  const owned = loadOwned();
  const container = document.getElementById("card-list");
  const grouped = {};
  CARDS.forEach((c, i) => {
    if (!grouped[c.set]) grouped[c.set] = [];
    grouped[c.set].push({ ...c, _i: i });
  });

  let html = "";
  for (const [setName, cards] of Object.entries(grouped)) {
    html += `<div class="set-group"><div class="set-header">${setName}</div><div class="card-grid">`;
    for (const c of cards) {
      const cid = cardId(c);
      const state = owned[cid] === true ? "owned" : (owned[cid] || "");
      const cardClass = state === "owned" ? "owned" : state === "ontheway" ? "ontheway" : "";
      const badgeText = state === "owned" ? "OWNED" : state === "ontheway" ? "ON THE WAY" : "";
      const btnClass = state === "owned" ? "owned" : state === "ontheway" ? "ontheway" : "";
      const btnText = state === "owned" ? "&#10003; Owned" : state === "ontheway" ? "&#128230; On the way" : "&#9744; Don't have yet";
      const dn = c.displayNum || (c.setTotal ? `${parseInt(c.number,10)} / ${c.setTotal}` : `#${parseInt(c.number,10)}`);
      const hpStr = c.hp ? `<span><b>HP:</b> ${c.hp}</span>` : "";
      const weakStr = c.weakness && c.weakness !== "None" ? `<span><b>Weak:</b> ${c.weakness}</span>` : "";
      html += `
        <div class="card ${cardClass}" id="card-${cid}">
          <div class="status-badge">${badgeText}</div>
          <div class="card-img-wrap">
            <img src="${getImgUrl(c)}" alt="${c.name}" loading="lazy"
                 onerror="this.onerror=null;this.alt='Image not available';">
          </div>
          <div class="card-info">
            <div class="card-name">${c.name}</div>
            <div class="card-meta">
              <span><b>Set:</b> ${c.set}</span>
              <span><b>#</b> ${dn}</span>
              ${hpStr}
            </div>
            <div class="card-meta">
              <span class="type-badge type-${c.type.toLowerCase()}">${c.type}</span>
              <span class="rarity-badge rarity-${c.rarityClass}">${c.rarity}</span>
              ${weakStr}
            </div>
            <div class="status-row">
              <button class="status-btn ${btnClass}" onclick="cycleState('${cid}')">${btnText}</button>
            </div>
          </div>
        </div>`;
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
  updateCount();
}

async function cycleState(cid) {
  const owned = loadOwned();
  const cur = owned[cid] === true ? "owned" : (owned[cid] || "");
  const next = cur === "" ? "ontheway" : cur === "ontheway" ? "owned" : "";
  if (next) owned[cid] = next; else delete owned[cid];
  if (canSaveProgressFiles()) await persistProgress();

  const el = document.getElementById(`card-${cid}`);
  if (!el) return;
  el.classList.remove("owned", "ontheway");
  if (next) el.classList.add(next);

  const badge = el.querySelector(".status-badge");
  badge.textContent = next === "owned" ? "OWNED" : next === "ontheway" ? "ON THE WAY" : "";
  badge.style.display = next ? "block" : "none";

  const btn = el.querySelector(".status-btn");
  btn.className = "status-btn" + (next ? " " + next : "");
  btn.innerHTML = next === "owned" ? "&#10003; Owned" : next === "ontheway" ? "&#128230; On the way" : "&#9744; Don't have yet";

  updateCount();
}

document.getElementById("date-str").textContent = new Date().toLocaleDateString("en-US", {
  year: "numeric", month: "long", day: "numeric"
});

(async function boot() {
  await pullProgress();
  envHint();
  render();
})();
</script>
</div>

<script>
const HASH = "cdb1b5a8f8ddb270135b9d7b27cdf57e5e346d92b53d2bdc595a50b26029ab32";
async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");
}
async function unlock() {
  const pw = document.getElementById("lock-pw").value;
  if ((await sha256(pw)) === HASH) {
    sessionStorage.setItem("poke-auth", "1");
    document.getElementById("lock-screen").classList.add("hidden");
    document.getElementById("app-content").style.display = "";
  } else {
    document.getElementById("lock-err").textContent = "Wrong password";
  }
}
if (sessionStorage.getItem("poke-auth") === "1") {
  document.getElementById("lock-screen").classList.add("hidden");
  document.getElementById("app-content").style.display = "";
}
document.getElementById("lock-btn").addEventListener("click", unlock);
document.getElementById("lock-pw").addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });
</script>
</body>
</html>
