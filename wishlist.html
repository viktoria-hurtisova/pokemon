<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist - Pok&eacute;mon Card Checklist</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 20px;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 12px;
    color: #7ec8e3;
    text-decoration: none;
    font-size: 14px;
  }
  .back-link:hover { text-decoration: underline; }

  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 6px;
    color: #e8a0e8;
  }

  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
  }

  .stats-bar {
    text-align: center;
    margin-bottom: 20px;
    font-size: 15px;
    color: #aaa;
  }

  .stats-bar span {
    font-weight: bold;
    color: #e8a0e8;
  }

  .set-group { margin-bottom: 30px; }

  .set-header {
    font-size: 20px;
    font-weight: bold;
    color: #f0c040;
    border-bottom: 2px solid #f0c04055;
    padding-bottom: 6px;
    margin-bottom: 14px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .card {
    background: #16213e;
    border: 1px solid #333;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow .2s;
    position: relative;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .card:hover { box-shadow: 0 0 12px rgba(232,160,232,.35); }
  .card.owned { border-color: #4caf50; }
  .card.owned .owned-badge { display: block; }

  .owned-badge {
    display: none;
    position: absolute;
    top: 8px;
    right: 8px;
    background: #4caf50;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 4px;
    z-index: 2;
  }

  .card-img-wrap {
    background: #0d1b36;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    padding: 10px;
  }

  .card-img-wrap img {
    max-width: 100%;
    max-height: 260px;
    border-radius: 6px;
  }

  .card-info {
    padding: 10px 12px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-name { font-size: 15px; font-weight: bold; color: #fff; }

  .card-meta {
    font-size: 12px;
    color: #aaa;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
  }

  .card-meta b { color: #ccc; }

  .rarity-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
  }

  .rarity-sar   { background: #e65100; }
  .rarity-ir    { background: #00838f; }
  .rarity-holo  { background: #5c6bc0; }
  .rarity-ur    { background: #6a1b9a; }
  .rarity-uncommon { background: #558b2f; }
  .rarity-promo { background: #b71c1c; }
  .rarity-mar   { background: #d50000; }
  .rarity-dr    { background: #1565c0; }
  .rarity-common { background: #757575; }

  .type-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
  }

  .type-grass     { background: #4caf50; }
  .type-fire      { background: #f44336; }
  .type-water     { background: #2196f3; }
  .type-electric  { background: #fbc02d; color: #333; }
  .type-psychic   { background: #9c27b0; }
  .type-fighting  { background: #a1887f; }
  .type-dragon    { background: #7c4dff; }
  .type-darkness  { background: #424242; }
  .type-metal     { background: #78909c; }
  .type-colorless { background: #78909c; }
  .type-trainer   { background: #607d8b; }

  .checkbox-row {
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid #ffffff15;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .checkbox-row label {
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    color: #bbb;
  }

  .checkbox-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #4caf50;
  }

  @media print {
    body { background: #fff; color: #000; padding: 0; font-size: 11px; }
    .back-link { display: none; }
    h1 { color: #000; font-size: 22px; }
    .subtitle { color: #555; }
    .stats-bar { display: none; }
    .set-header { color: #000; border-color: #000; font-size: 16px; }

    .card-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .card {
      background: #fff;
      border: 1.5px solid #000;
      border-radius: 6px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .card:hover { box-shadow: none; }
    .card.owned { display: none !important; }
    .card-img-wrap { background: #f5f5f5; min-height: 120px; padding: 6px; }

    .card-img-wrap img {
      max-height: 170px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .card-info { padding: 6px 8px 8px; }
    .card-name { color: #000; font-size: 12px; }
    .card-meta { color: #333; font-size: 10px; }
    .card-meta b { color: #000; }

    .rarity-badge, .type-badge, .owned-badge {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .checkbox-row input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border: 2px solid #000;
      border-radius: 2px;
      background: #fff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .checkbox-row label { color: #000; font-size: 11px; }
    .set-group { break-inside: avoid; }
  }
</style>
</head>

function getImgUrl(c) {
  if (c.number.startsWith("h")) return `https://www.serebii.net/card/${c.setSlug}/${c.number}.jpg`;
  return `https://www.serebii.net/card/${c.setSlug}/${parseInt(c.number, 10)}.jpg`;
}

function cardId(c) { return `${c.setSlug}-${c.number}`; }

function loadOwned() {
  try { return JSON.parse(localStorage.getItem("wishlist-owned") || "{}"); }
  catch { return {}; }
}

function saveOwned(map) { localStorage.setItem("wishlist-owned", JSON.stringify(map)); }

function updateCount() {
  const owned = loadOwned();
  document.getElementById("count-owned").textContent = Object.values(owned).filter(Boolean).length;
  document.getElementById("count-total").textContent = CARDS.length;
}

function render() {
  const owned = loadOwned();
  const container = document.getElementById("card-list");
  const grouped = {};
  CARDS.forEach((c, i) => {
    if (!grouped[c.set]) grouped[c.set] = [];
    grouped[c.set].push({ ...c, _i: i });
  });

  let html = "";
  for (const [setName, cards] of Object.entries(grouped)) {
    html += `<div class="set-group"><div class="set-header">${setName}</div><div class="card-grid">`;
    for (const c of cards) {
      const cid = cardId(c);
      const isOwned = !!owned[cid];
      const dn = c.displayNum || (c.setTotal ? `${parseInt(c.number,10)} / ${c.setTotal}` : `#${parseInt(c.number,10)}`);
      const hpStr = c.hp ? `<span><b>HP:</b> ${c.hp}</span>` : "";
      const weakStr = c.weakness && c.weakness !== "None" ? `<span><b>Weak:</b> ${c.weakness}</span>` : "";
      html += `
        <div class="card ${isOwned ? "owned" : ""}" id="card-${cid}">
          <div class="owned-badge">OWNED</div>
          <div class="card-img-wrap">
            <img src="${getImgUrl(c)}" alt="${c.name}" loading="lazy"
                 onerror="this.onerror=null;this.alt='Image not available';">
          </div>
          <div class="card-info">
            <div class="card-name">${c.name}</div>
            <div class="card-meta">
              <span><b>Set:</b> ${c.set}</span>
              <span><b>#</b> ${dn}</span>
              ${hpStr}
            </div>
            <div class="card-meta">
              <span class="type-badge type-${c.type.toLowerCase()}">${c.type}</span>
              <span class="rarity-badge rarity-${c.rarityClass}">${c.rarity}</span>
              ${weakStr}
            </div>
            <div class="checkbox-row">
              <input type="checkbox" id="chk-${cid}" ${isOwned ? "checked" : ""}
                     onchange="toggleOwned('${cid}', this.checked)">
              <label for="chk-${cid}">I have this card</label>
            </div>
          </div>
        </div>`;
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
  updateCount();
}

function toggleOwned(cid, checked) {
  const owned = loadOwned();
  owned[cid] = checked;
  saveOwned(owned);
  const el = document.getElementById(`card-${cid}`);
  if (el) el.classList.toggle("owned", checked);
  updateCount();
}

document.getElementById("date-str").textContent = new Date().toLocaleDateString("en-US", {
  year: "numeric", month: "long", day: "numeric"
});

render();
</script>
