<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ogerpon Card Checklist</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 20px;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 12px;
    color: #7ec8e3;
    text-decoration: none;
    font-size: 14px;
  }
  .back-link:hover { text-decoration: underline; }

  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 6px;
    color: #7ec8e3;
  }

  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
  }

  .stats-bar {
    text-align: center;
    margin-bottom: 20px;
    font-size: 15px;
    color: #aaa;
  }

  .stats-bar span {
    font-weight: bold;
    color: #7ec8e3;
  }

  .set-group {
    margin-bottom: 30px;
  }

  .set-header {
    font-size: 20px;
    font-weight: bold;
    color: #f0c040;
    border-bottom: 2px solid #f0c04055;
    padding-bottom: 6px;
    margin-bottom: 14px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .card {
    background: #16213e;
    border: 1px solid #333;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow .2s;
    position: relative;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .card:hover { box-shadow: 0 0 12px rgba(126,200,227,.35); }

  .card.owned { border-color: #4caf50; }
  .card.owned .status-badge { display: block; background: #4caf50; }
  .card.ontheway { border-color: #ff9800; }
  .card.ontheway .status-badge { display: block; background: #ff9800; }

  .status-badge {
    display: none;
    position: absolute;
    top: 8px;
    right: 8px;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 4px;
    z-index: 2;
  }

  .card-img-wrap {
    background: #0d1b36;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    padding: 10px;
  }

  .card-img-wrap img {
    max-width: 100%;
    max-height: 260px;
    border-radius: 6px;
  }

  .card-info {
    padding: 10px 12px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-name {
    font-size: 15px;
    font-weight: bold;
    color: #fff;
  }

  .card-meta {
    font-size: 12px;
    color: #aaa;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
  }

  .card-meta b { color: #ccc; }

  .rarity-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
  }

  .rarity-holo       { background: #5c6bc0; }
  .rarity-double      { background: #7b1fa2; }
  .rarity-ir          { background: #00838f; }
  .rarity-sar         { background: #e65100; }
  .rarity-hr          { background: #bf360c; }
  .rarity-uncommon    { background: #558b2f; }
  .rarity-promo       { background: #6d4c41; }

  .type-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
  }

  .type-grass     { background: #4caf50; }
  .type-fire      { background: #f44336; }
  .type-water     { background: #2196f3; }
  .type-fighting  { background: #a1887f; }

  .status-row {
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid #ffffff15;
  }

  .status-btn {
    width: 100%;
    padding: 7px 12px;
    border: 2px solid #555;
    border-radius: 6px;
    background: transparent;
    color: #bbb;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: all .15s;
  }

  .status-btn:hover { border-color: #888; color: #fff; }

  .status-btn.ontheway {
    border-color: #ff9800;
    color: #ff9800;
    background: #ff980015;
  }

  .status-btn.owned {
    border-color: #4caf50;
    color: #4caf50;
    background: #4caf5015;
  }

  /* ---------- PRINT STYLES ---------- */
  @media print {
    body {
      background: #fff;
      color: #000;
      padding: 0;
      font-size: 11px;
    }

    .back-link { display: none; }
    h1 { color: #000; font-size: 22px; }
    .subtitle { color: #555; }
    .stats-bar { display: none; }

    .set-header {
      color: #000;
      border-color: #000;
      font-size: 16px;
    }

    .card-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .card {
      background: #fff;
      border: 1.5px solid #000;
      border-radius: 6px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .card:hover { box-shadow: none; }
    .card.owned { display: none !important; }

    .card-img-wrap {
      background: #f5f5f5;
      min-height: 120px;
      padding: 6px;
    }

    .card-img-wrap img {
      max-height: 170px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .card-info { padding: 6px 8px 8px; }
    .card-name { color: #000; font-size: 12px; }
    .card-meta { color: #333; font-size: 10px; }
    .card-meta b { color: #000; }

    .rarity-badge, .type-badge {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .status-badge {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .status-btn {
      font-size: 11px;
      padding: 4px 8px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .set-group { break-inside: avoid; }
  }

  #lock-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
  }
  #lock-screen.hidden { display: none; }
  .lock-box {
    background: #16213e; border-radius: 16px; padding: 40px 32px;
    text-align: center; width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .lock-box h2 { color: #fff; margin-bottom: 8px; font-size: 22px; }
  .lock-box p { color: #888; font-size: 13px; margin-bottom: 24px; }
  .lock-box input {
    width: 100%; padding: 12px 16px; border-radius: 8px; border: 2px solid #333;
    background: #0f0f23; color: #fff; font-size: 16px; outline: none;
    margin-bottom: 16px; text-align: center;
  }
  .lock-box input:focus { border-color: #7ec8e3; }
  .lock-box button {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .lock-box button:hover { opacity: .9; }
  .lock-error { color: #ef5350; font-size: 13px; margin-top: 8px; min-height: 20px; }
  @media print { #lock-screen { display: none !important; } }
</style>
</head>

function getImgUrl(c) {
  const num = parseInt(c.number, 10);
  return `https://www.serebii.net/card/${c.setSlug}/${num}.jpg`;
}

function cardId(c, i) {
  return `${c.setSlug}-${c.number}`;
}

function loadOwned() {
  try {
    return JSON.parse(localStorage.getItem("ogerpon-owned") || "{}");
  } catch { return {}; }
}

function saveOwned(map) {
  localStorage.setItem("ogerpon-owned", JSON.stringify(map));
}

function updateCount() {
  const owned = loadOwned();
  const total = CARDS.length;
  const count = Object.values(owned).filter(v => v === "owned" || v === true).length;
  document.getElementById("count-owned").textContent = count;
  document.getElementById("count-total").textContent = total;
}

function render() {
  const owned = loadOwned();
  const container = document.getElementById("card-list");

  const grouped = {};
  CARDS.forEach((c, i) => {
    if (!grouped[c.set]) grouped[c.set] = [];
    grouped[c.set].push({ ...c, _i: i });
  });

  let html = "";
  for (const [setName, cards] of Object.entries(grouped)) {
    html += `<div class="set-group">`;
    html += `<div class="set-header">${setName}</div>`;
    html += `<div class="card-grid">`;
    for (const c of cards) {
      const cid = cardId(c, c._i);
      const state = owned[cid] === true ? "owned" : (owned[cid] || "");
      const cardClass = state === "owned" ? "owned" : state === "ontheway" ? "ontheway" : "";
      const badgeText = state === "owned" ? "OWNED" : state === "ontheway" ? "ON THE WAY" : "";
      const btnClass = state === "owned" ? "owned" : state === "ontheway" ? "ontheway" : "";
      const btnText = state === "owned" ? "&#10003; Owned" : state === "ontheway" ? "&#128230; On the way" : "&#9744; Don't have yet";
      const numberStr = c.setTotal ? `${c.number} / ${c.setTotal}` : `#${c.number}`;
      html += `
        <div class="card ${cardClass}" id="card-${cid}">
          <div class="status-badge">${badgeText}</div>
          <div class="card-img-wrap">
            <img src="${getImgUrl(c)}" alt="${c.name}" loading="lazy"
                 onerror="this.onerror=null;this.alt='Image not available';">
          </div>
          <div class="card-info">
            <div class="card-name">${c.name}</div>
            <div class="card-meta">
              <span><b>Set:</b> ${c.set}</span>
              <span><b>#</b> ${numberStr}</span>
              <span><b>HP:</b> ${c.hp}</span>
            </div>
            <div class="card-meta">
              <span class="type-badge type-${c.type.toLowerCase()}">${c.type}</span>
              <span class="rarity-badge rarity-${c.rarityClass}">${c.rarity}</span>
              <span><b>Weak:</b> ${c.weakness}</span>
            </div>
            <div class="status-row">
              <button class="status-btn ${btnClass}" onclick="cycleState('${cid}')">${btnText}</button>
            </div>
          </div>
        </div>`;
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
  updateCount();
}

function cycleState(cid) {
  const owned = loadOwned();
  const cur = owned[cid] === true ? "owned" : (owned[cid] || "");
  const next = cur === "" ? "ontheway" : cur === "ontheway" ? "owned" : "";
  if (next) owned[cid] = next; else delete owned[cid];
  saveOwned(owned);

  const el = document.getElementById(`card-${cid}`);
  if (!el) return;
  el.classList.remove("owned", "ontheway");
  if (next) el.classList.add(next);

  const badge = el.querySelector(".status-badge");
  badge.textContent = next === "owned" ? "OWNED" : next === "ontheway" ? "ON THE WAY" : "";
  badge.style.display = next ? "block" : "none";

  const btn = el.querySelector(".status-btn");
  btn.className = "status-btn" + (next ? " " + next : "");
  btn.innerHTML = next === "owned" ? "&#10003; Owned" : next === "ontheway" ? "&#128230; On the way" : "&#9744; Don't have yet";

  updateCount();
}

document.getElementById("date-str").textContent = new Date().toLocaleDateString("en-US", {
  year: "numeric", month: "long", day: "numeric"
});

render();

</div>

<script>
const HASH = "cdb1b5a8f8ddb270135b9d7b27cdf57e5e346d92b53d2bdc595a50b26029ab32";
async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");
}
async function unlock() {
  const pw = document.getElementById("lock-pw").value;
  if ((await sha256(pw)) === HASH) {
    sessionStorage.setItem("poke-auth", "1");
    document.getElementById("lock-screen").classList.add("hidden");
    document.getElementById("app-content").style.display = "";
  } else {
    document.getElementById("lock-err").textContent = "Wrong password";
  }
}
if (sessionStorage.getItem("poke-auth") === "1") {
  document.getElementById("lock-screen").classList.add("hidden");
  document.getElementById("app-content").style.display = "";
}
document.getElementById("lock-btn").addEventListener("click", unlock);
document.getElementById("lock-pw").addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });
</script>
